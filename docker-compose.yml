services:
  smart-paper:
    build: .
    container_name: smart-paper
    ports:
      - "8010:8010"
    environment:
      - FINANCE_PIN=${FINANCE_PIN}
      - FINANCE_UNLOCK_TTL_SECONDS=${FINANCE_UNLOCK_TTL_SECONDS}
    volumes:
      - ./:/app
    command: sh /app/scripts/start_backend.sh

  smart-paper-front:
    image: node:current
    container_name: smart-paper-front
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../smart-paper-front:/app
    command: sh -c "npm ci && npm run build && npm run start -- -H 0.0.0.0 -p 3000"
    depends_on:
      - smart-paper
